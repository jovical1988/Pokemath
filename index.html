<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Math Battle Arena V40 - Multiplicación con X</title>
    <style>
        :root { 
            --azul: #00d2ff; --rojo: #ff0055; --oro: #f1c40f; --verde: #2ecc71; 
            --bg-menu: url('p-menu.jpg');
            --p1-sprite: url('assets/p1_idle.png');
            --p2-sprite: url('assets/p2_idle.png');
            --p3-sprite: url('assets/p3_idle.png');
            --p4-sprite: url('assets/p4_idle.png');
        }
        
        * { touch-action: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; background: #000; color: white; font-family: 'Arial Black', sans-serif; overflow: hidden; height: 100vh; }

        /* --- MENÚS --- */
        .pantalla { position: fixed; inset: 0; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), var(--bg-menu); background-size: cover; background-position: center; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; padding: 20px; }
        .active { display: flex; }
        .btn-menu { min-width: 280px; padding: 15px; margin: 8px; font-size: 1.2rem; cursor: pointer; background: rgba(255,255,255,0.05); color: white; border: 3px solid white; border-radius: 15px; font-family: inherit; text-transform: uppercase; }

        /* --- SELECCIÓN PERSONAJES --- */
        #char-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
        .char-box { width: 90px; height: 120px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.2s; }
        .char-img { width: 80px; height: 80px; border-radius: 12px; border: 3px solid rgba(255,255,255,0.3); background-size: cover; background-position: center; background-color: #222; }
        .char-name-label { font-size: 0.9rem; color: #fff; margin-top: 5px; text-shadow: 2px 2px #000; }
        .char-box.selected { opacity: 0.3; transform: scale(0.9); }

        /* --- SELECTOR DE ARENAS --- */
        .grid-arenas { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; margin: 20px 0; }
        .card-arena { aspect-ratio: 16/9; border: 3px solid white; border-radius: 12px; overflow: hidden; cursor: pointer; position: relative; background: #222; }
        .card-arena img { width: 100%; height: 100%; object-fit: cover; }
        .card-arena span { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.8); padding: 5px; font-size: 0.8rem; text-transform: uppercase; }

        /* --- RANKING --- */
        .tabla-stats { width: 90%; max-width: 500px; border-collapse: collapse; margin: 20px 0; }
        .tabla-stats th { border-bottom: 2px solid var(--oro); padding: 10px; color: var(--oro); }
        .tabla-stats td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* --- ARENA & GAMEPLAY --- */
        #game-layout { display: none; flex-direction: column; width: 100vw; height: 100vh; }
        #arena { flex: 0 0 58%; position: relative; background-size: cover; background-position: center; border-bottom: 4px solid var(--oro); overflow: hidden; }
        #ui-controles { flex: 1; display: grid; background: #080808; padding: 5px; gap: 5px; }

        .pj-container { position: absolute; width: 96px; height: 120px; transform: translate(-50%, -50%); z-index: 5; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        .pj-name-tag { font-size: 0.75rem; color: white; margin-bottom: 2px; background: rgba(0,0,0,0.6); padding: 1px 8px; border-radius: 8px; font-weight: bold; }
        .vida-barra { width: 70px; height: 8px; background: #222; border: 1px solid #000; border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
        .vida-fill { height: 100%; width: 100%; background: var(--verde); transition: 0.3s; }

        .panel-jugador { display: flex; flex-direction: column; align-items: center; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 4px; background: rgba(255,255,255,0.02); height: 100%; }
        .pregunta { font-size: 1.2rem; color: var(--oro); margin: 2px 0; }
        .grid-respuestas { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; width: 100%; flex: 1; }
        .btn-ans { border: none; border-radius: 6px; color: white; font-size: 1rem; cursor: pointer; font-family: inherit; height: 100%; }
        
        .pj-animated { width: 96px; height: 96px; background-repeat: no-repeat; image-rendering: pixelated; background-size: 384px 96px; animation: playIdle 0.8s steps(4) infinite; }
        @keyframes playIdle { from { background-position: 0px; } to { background-position: -384px; } }
        .look-left { transform: scaleX(-1); }
        .sprite-p1 { background-image: var(--p1-sprite); }
        .sprite-p2 { background-image: var(--p2-sprite); }
        .sprite-p3 { background-image: var(--p3-sprite); }
        .sprite-p4 { background-image: var(--p4-sprite); }
        .bala { position: absolute; width: 12px; height: 12px; border-radius: 50%; z-index: 10; transform: translate(-50%, -50%); box-shadow: 0 0 10px white; }
    </style>
</head>
<body>

    <div id="p-modo" class="pantalla active">
        <h1 style="color:var(--oro)">MODO DE JUEGO</h1>
        <button class="btn-menu" onpointerdown="setModo(1)">1 VS 1</button>
        <button class="btn-menu" onpointerdown="setModo(2)">2 VS 2</button>
        <button class="btn-menu" onpointerdown="setModo(1.5)">1 VS 2</button>
    </div>

    <div id="p-chars" class="pantalla">
        <h1 id="char-title">P1 ELIGE</h1>
        <div id="char-grid"></div>
        <button class="btn-menu" onpointerdown="atrasChar()" style="width: 150px; border-color: var(--rojo);">ATRÁS</button>
    </div>

    <div id="p-op" class="pantalla">
        <h1>OPERACIÓN</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn-menu" onpointerdown="setOp('+')">+</button>
            <button class="btn-menu" onpointerdown="setOp('-')">-</button>
            <button class="btn-menu" onpointerdown="setOp('*')">X</button>
            <button class="btn-menu" onpointerdown="setOp('/')">÷</button>
        </div>
    </div>

    <div id="p-dif" class="pantalla">
        <h1>DIFICULTAD</h1>
        <button class="btn-menu" onpointerdown="setDif(1)">FÁCIL</button>
        <button class="btn-menu" onpointerdown="setDif(2)">MEDIO</button>
        <button class="btn-menu" onpointerdown="setDif(3)">DIFÍCIL</button>
    </div>

    <div id="p-world" class="pantalla">
        <h1>ELIGE ARENA</h1>
        <div id="arena-selector-grid" class="grid-arenas"></div>
        <button class="btn-menu" onpointerdown="irA('p-dif')" style="width: 150px; font-size: 0.9rem;">ATRÁS</button>
    </div>

    <div id="p-ranking" class="pantalla">
        <h1 id="winner-text" style="color:var(--oro)">VICTORIA</h1>
        <table class="tabla-stats">
            <thead><tr><th>JUGADOR</th><th>ACIERTOS</th><th>FALLOS</th></tr></thead>
            <tbody id="ranking-body"></tbody>
        </table>
        <div id="mvp-text" style="margin-bottom:20px; color:var(--oro); font-size:1.5rem;"></div>
        <button class="btn-menu" onpointerdown="location.reload()">REINTENTAR</button>
    </div>

    <div id="game-layout">
        <div style="height:35px; background:#000; display:flex; justify-content:space-between; align-items:center; padding:0 15px; border-bottom:1px solid #333;">
            <button onpointerdown="location.reload()" style="background:#444; border:none; color:white; padding:3px 8px; border-radius:5px; font-size:0.7rem;">SALIR</button>
            <div style="color:var(--oro); font-size:0.8rem;">MATH ARENA</div>
            <button onpointerdown="togglePausa()" id="btn-pausa" style="background:var(--oro); border:none; padding:3px 8px; border-radius:5px; font-size:0.7rem; color:black;">PAUSA</button>
        </div>
        <div id="arena"></div>
        <div id="ui-controles"></div>
    </div>

    <script>
        let config = { modo: 1, op: '+', nivel: 1, world: '', pausado: false };
        let selectedPjs = [];
        let players = {};
        
        const availableChars = [
            { id: 'p1', nombre: 'Jose', spriteClass: 'sprite-p1', thumb: 'assets/p1_thumb.png', color: '#00d2ff' },
            { id: 'p2', nombre: 'Xavi', spriteClass: 'sprite-p2', thumb: 'assets/p2_thumb.png', color: '#ff0055' },
            { id: 'p3', nombre: 'Laura', spriteClass: 'sprite-p3', thumb: 'assets/p3_thumb.png', color: '#3357FF' },
            { id: 'p4', nombre: 'Neus', spriteClass: 'sprite-p4', thumb: 'assets/p4_thumb.png', color: '#f1c40f' }
        ];

        const arenas = [
            { nombre: 'Cyber City', img: 'arena1.jpg', thumb: 'thumb1.jpg' },
            { nombre: 'Magma Station', img: 'arena2.jpg', thumb: 'thumb2.jpg' },
            { nombre: 'Void Orbit', img: 'arena3.jpg', thumb: 'thumb3.jpg' },
            { nombre: 'Ice Rift', img: 'arena4.jpg', thumb: 'thumb4.jpg' }
        ];

        function renderChars() {
            const grid = document.getElementById('char-grid');
            grid.innerHTML = '';
            availableChars.forEach((char, index) => {
                const isSelected = selectedPjs.some(s => s.originalIndex === index);
                const box = document.createElement('div');
                box.className = 'char-box' + (isSelected ? ' selected' : '');
                box.onpointerdown = () => pickChar(index);
                box.innerHTML = `<div class="char-img" style="background-image: url('${char.thumb}')"></div><div class="char-name-label">${char.nombre}</div>`;
                grid.appendChild(box);
            });
        }

        const aGrid = document.getElementById('arena-selector-grid');
        arenas.forEach(a => {
            const card = document.createElement('div');
            card.className = 'card-arena';
            card.onpointerdown = () => setWorld(a.img);
            card.innerHTML = `<img src="${a.thumb}"><span>${a.nombre}</span>`;
            aGrid.appendChild(card);
        });

        function irA(destino) { document.querySelectorAll('.pantalla').forEach(p => p.classList.remove('active')); document.getElementById(destino).classList.add('active'); }
        function setModo(m) { config.modo = m; selectedPjs = []; renderChars(); updateCharTitle(); irA('p-chars'); }
        function pickChar(idx) {
            if (selectedPjs.some(s => s.originalIndex === idx)) return;
            selectedPjs.push({...availableChars[idx], originalIndex: idx});
            renderChars();
            let total = (config.modo === 1) ? 2 : (config.modo === 2 ? 4 : 3);
            if (selectedPjs.length < total) updateCharTitle(); else irA('p-op');
        }
        function atrasChar() { if (selectedPjs.length === 0) irA('p-modo'); else { selectedPjs.pop(); renderChars(); updateCharTitle(); } }
        function updateCharTitle() { document.getElementById('char-title').innerText = `P${selectedPjs.length + 1} ELIGE`; }
        function setOp(o) { config.op = o; irA('p-dif'); }
        function setDif(n) { config.nivel = n; irA('p-world'); }
        function setWorld(img) { config.world = img; irA('game-layout'); document.getElementById('game-layout').style.display = 'flex'; document.getElementById('arena').style.backgroundImage = `url('${img}')`; setupJuego(); }
        function togglePausa() { config.pausado = !config.pausado; document.getElementById('btn-pausa').innerText = config.pausado ? "PLAY" : "PAUSA"; }

        function setupJuego() {
            const ui = document.getElementById('ui-controles'); const arena = document.getElementById('arena');
            ui.innerHTML = ''; arena.innerHTML = ''; 
            let ids = (config.modo === 1) ? ['p1', 'p2'] : (config.modo === 2 ? ['p1', 'p2', 'p3', 'p4'] : ['p1', 'p2', 'p3']);
            ui.style.gridTemplateColumns = `repeat(${ids.length}, 1fr)`;
            
            ids.forEach((id, i) => {
                let equipo = (config.modo === 1) ? (i===0?'L':'R') : (i < 2 ? 'L' : 'R');
                if(config.modo === 1.5 && i === 2) equipo = 'R';
                const charData = selectedPjs[i];
                players[id] = { hp: 100, vivo: true, equipo: equipo, color: charData.color, nombre: charData.nombre, aciertos: 0, fallos: 0 };
                ui.innerHTML += `<div class="panel-jugador"><div style="color:${charData.color}; font-size:0.65rem; font-weight:bold;">${charData.nombre.toUpperCase()}</div><div class="pregunta" id="q-${id}">?</div><div class="grid-respuestas" id="ans-${id}"></div></div>`;
                const posX = (equipo === 'L') ? 25 : 75; 
                let posY = (config.modo === 1) ? 55 : (equipo === 'L' ? (i===0?30:70) : (config.modo===2?(i===2?30:70):50));
                const container = document.createElement('div');
                container.id = `cont-${id}`; container.className = 'pj-container';
                container.style.left = `${posX}%`; container.style.top = `${posY}%`;
                container.innerHTML = `<div class="pj-name-tag">${charData.nombre}</div><div class="vida-barra"><div id="v-${id}" class="vida-fill"></div></div><div class="pj-animated ${charData.spriteClass} ${equipo === 'R' ? 'look-left' : ''}"></div>`;
                arena.appendChild(container);
            });
            ids.forEach(id => generarPregunta(id));
        }

        function generarPregunta(id) {
            if(!players[id].vivo) return;
            let maxN = (config.nivel === 1) ? 9 : (config.nivel === 2 ? 12 : 15);
            let n1 = Math.floor(Math.random()*maxN)+1; let n2 = Math.floor(Math.random()*maxN)+1; let res;
            
            // Lógica de operación con símbolo visual
            let simboloVisual = config.op;
            if(config.op === '+') res = n1+n2; 
            else if(config.op === '-') { res = n1; n1 = n1+n2; } 
            else if(config.op === '*') { res = n1*n2; simboloVisual = 'X'; } // Cambio de * por X
            else { res = n1; n1 = n1*n2; }

            document.getElementById(`q-${id}`).innerText = `${n1}${simboloVisual}${n2}`;
            const container = document.getElementById(`ans-${id}`); container.innerHTML = '';
            
            // Generar 4 opciones
            let opciones = [res, res + (Math.random() > 0.5 ? 1 : -1), res + 2, res + 5];
            opciones = [...new Set(opciones)].sort(() => Math.random() - 0.5);
            
            opciones.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn-ans'; b.style.background = players[id].color; b.innerText = o;
                b.onpointerdown = () => { 
                    if(config.pausado) return;
                    if(o === res) { players[id].aciertos++; disparar(id); } else { players[id].fallos++; }
                    generarPregunta(id); 
                };
                container.appendChild(b);
            });
        }

        function disparar(id) {
            const arena = document.getElementById('arena'); const miPj = document.getElementById(`cont-${id}`);
            const rivales = Object.keys(players).filter(pid => players[pid].equipo !== players[id].equipo && players[pid].vivo);
            if(rivales.length === 0) return;
            const targetID = rivales[Math.floor(Math.random()*rivales.length)];
            const targetPj = document.getElementById(`cont-${targetID}`);
            const bala = document.createElement('div'); bala.className = 'bala'; bala.style.background = players[id].color;
            let bX = miPj.offsetLeft; let bY = miPj.offsetTop + 15;
            bala.style.left = bX + 'px'; bala.style.top = bY + 'px'; arena.appendChild(bala);
            const angle = Math.atan2(targetPj.offsetTop - bY, targetPj.offsetLeft - bX);
            const vx = Math.cos(angle) * 18; const vy = Math.sin(angle) * 18;
            const loop = setInterval(() => {
                if(config.pausado) return;
                bX += vx; bY += vy; bala.style.left = bX + 'px'; bala.style.top = bY + 'px';
                if(Math.hypot(targetPj.offsetLeft - bX, targetPj.offsetTop - bY) < 40) {
                    players[targetID].hp -= 10;
                    document.getElementById(`v-${targetID}`).style.width = Math.max(0, players[targetID].hp) + '%';
                    if(players[targetID].hp <= 0) { players[targetID].vivo = false; targetPj.style.opacity = '0'; checkWinner(); }
                    clearInterval(loop); bala.remove();
                }
                if(bX < 0 || bX > arena.offsetWidth || bY < 0 || bY > arena.offsetHeight) { clearInterval(loop); bala.remove(); }
            }, 16);
        }

        function checkWinner() {
            const vivos = Object.keys(players).filter(id => players[id].vivo);
            const equiposVivos = [...new Set(vivos.map(id => players[id].equipo))];
            if(equiposVivos.length <= 1) mostrarRanking(equiposVivos[0]);
        }

        function mostrarRanking(eqGanador) {
            const body = document.getElementById('ranking-body'); body.innerHTML = '';
            document.getElementById('winner-text').innerText = eqGanador === 'L' ? "EQUIPO IZQUIERDO GANA" : "EQUIPO DERECHO GANA";
            let maxAciertos = -1; let mvp = "";
            Object.keys(players).forEach(id => {
                const p = players[id];
                if(p.aciertos > maxAciertos) { maxAciertos = p.aciertos; mvp = p.nombre; }
                body.innerHTML += `<tr><td>${p.nombre}</td><td>${p.aciertos}</td><td>${p.fallos}</td></tr>`;
            });
            document.getElementById('mvp-text').innerText = `👑 MVP: ${mvp.toUpperCase()} 👑`;
            irA('p-ranking');
        }
    </script>
</body>
</html>
